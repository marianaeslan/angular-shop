<mat-card class="product-card">
  <mat-card-header class="zero-padding">
    <mat-card-title >Título</mat-card-title>
    <mat-card-subtitle>Subtítulo</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content class="zero-padding">
    Descrição do produto
  </mat-card-content>
  <mat-card-footer class="zero-padding">
    <mat-chip-set class="zero-padding">
      <mat-chip>Categoria 1</mat-chip>
      <mat-chip>Categoria 2</mat-chip>
    </mat-chip-set>
    <button mat-flat-button color="primary">Adicionar ao carrinho</button>

  </mat-card-footer>
</mat-card>
