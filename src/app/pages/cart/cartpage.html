@for (item of cartItems(); track $index) {
  <app-product-cart [produto]="item" [itemIndex]="$index" />
} @empty {
  <div class="empty-cart">
    <p>Seu carrinho está vazio</p>
    <button mat-button routerLink="/">Voltar para loja</button>
  </div>
}

@if (cartItems().length > 0) {
  <div class="cart-order">
    <button mat-flat-button color="primary" (click)="efetuarPagamento()">Finalizar compra</button>
    <p class="total">Valor total: {{ valorTotal() | currency: 'BRL' }}</p>
  </div>
}
