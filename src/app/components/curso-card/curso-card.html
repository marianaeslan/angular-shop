<mat-card class="curso-card pb">
  <mat-card-header class="pl-0">
    <mat-card-title class="pb">{{ curso().TITULO }} </mat-card-title>
  </mat-card-header>
  <mat-card-content class="pb pl-0">
    <div class="pb">{{ curso().DESCRICAO }}</div>
    <mat-progress-bar mode="determinate" value="40" class="pb"></mat-progress-bar>
  </mat-card-content>
  <mat-card-footer>
    <button mat-flat-button color="primary">Continuar curso</button>
  </mat-card-footer>
</mat-card>
