<mat-card class="product-card">
  <mat-card-header class="zero-padding">
    <mat-card-title>{{ produto().TITULO }}</mat-card-title>
  </mat-card-header>
  <mat-card-content class="zero-padding">
    {{ produto().DESCRICAO }}
  </mat-card-content>
  <mat-card-footer class="zero-padding">
    <mat-chip-set class="zero-padding">
      @for (categoria of produto().CATEGORIA; track $index) {
        <mat-chip>{{ categoria }}</mat-chip>
      }
    </mat-chip-set>
    <p class="price">{{ produto().PRECO | currency: 'BRL' }}</p>
    <button mat-flat-button color="primary" (click)="addToCart()">Adicionar ao carrinho</button>
  </mat-card-footer>
</mat-card>
